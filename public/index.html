<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Othello Online</title>

  <!-- CSS (fonts self-hosted for Discord CSP compatibility) -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/lobby.css">
  <link rel="stylesheet" href="/css/board.css">
</head>
<body>
  <div id="app"></div>

  <!-- Debug overlay (inline so it works even if all external JS fails) -->
  <script>
  (function(){
    var d=document.createElement('div');d.id='debug-log';
    d.style.cssText='position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);color:#0f0;font:11px monospace;padding:8px;max-height:40vh;overflow-y:auto;z-index:9999;';
    document.body.appendChild(d);
    window._dbg=function(m){
      var l=document.createElement('div');
      l.textContent=new Date().toISOString().substr(11,12)+' '+m;
      d.appendChild(l);d.scrollTop=d.scrollHeight;
      console.log('[DBG]',m);
    };
    window._dbg('HTML loaded');
    window._dbg('URL: '+location.href);
    window._dbg('frame_id: '+(new URLSearchParams(location.search).get('frame_id')||'MISSING'));
    window._dbg('instance_id: '+(new URLSearchParams(location.search).get('instance_id')||'MISSING'));
    window.onerror=function(msg,src,line,col,err){
      window._dbg('ERROR: '+msg+' ('+src+':'+line+')');
    };
  })();
  </script>

  <!-- Socket.IO Client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Discord Activity SDK (bundled IIFE) -->
  <script src="/js/discord-sdk.bundle.js?v=2"></script>

  <!-- Application JS (load order matters) -->
  <script src="/js/game-engine-client.js?v=2"></script>
  <script src="/js/ai-engine-client.js?v=2"></script>
  <script src="/js/lobby-view.js?v=2"></script>
  <script src="/js/game-view.js?v=2"></script>
  <script src="/js/socket-client.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
